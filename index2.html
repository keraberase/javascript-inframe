<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>API Explorer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f9f9f9;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 30px;
    }
    h2 {
      font-size: 18px;
      margin: 0 0 15px 0;
      color: #333;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    p {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 4px;
      margin: 10px 0;
      min-height: 20px;
    }
    img {
      width: 100%;
      max-height: 400px;
      object-fit: contain;
      border-radius: 4px;
      margin-bottom: 10px;
      display: none;
      background: #f0f0f0;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background: #0066cc;
      color: white;
    }
    button:hover {
      background: #0052a3;
    }
    #reveal-btn {
      display: none;
      background: #6c757d;
      margin-left: 8px;
    }
    #reveal-btn:hover {
      background: #5a6268;
    }
  </style>
</head>
<body>
  <h1>API Explorer</h1>

  <div class="card">
    <h2>Random Dog</h2>
    <img id="dog-img" alt="Random dog">
    <p id="dog-output">—</p>
    <button onclick="fetchDog()">Fetch dog</button>
  </div>

  <div class="card">
    <h2>Random Joke</h2>
    <p id="joke-setup">—</p>
    <button onclick="fetchJoke()">Fetch joke</button>
    <button id="reveal-btn" onclick="revealPunchline()">Reveal punchline</button>
  </div>

  <div class="card">
    <h2>Cat Fact</h2>
    <p id="cat-output">—</p>
    <button onclick="fetchCat()">Fetch fact</button>
  </div>

  <div class="card">
    <h2>Chuck Norris Joke</h2>
    <p id="chuck-output">—</p>
    <button onclick="fetchChuck()">Fetch joke</button>
  </div>

  <script>
    async function fetchDog() {
      const response = await fetch('https://dog.ceo/api/breeds/image/random');
      const data = await response.json();
      
      const img = document.getElementById('dog-img');
      img.src = data.message;
      img.style.display = 'block';
      
      const breed = data.message.split('/breeds/')[1]?.split('/')[0]?.replace(/-/g, ' ') || 'unknown breed';
      document.getElementById('dog-output').textContent = breed;
    }

    let currentPunchline = '';

    async function fetchJoke() {
      const response = await fetch('https://official-joke-api.appspot.com/random_joke');
      const data = await response.json();
      
      document.getElementById('joke-setup').textContent = data.setup;
      currentPunchline = data.punchline;
      document.getElementById('reveal-btn').style.display = 'inline-block';
    }

    function revealPunchline() {
      document.getElementById('joke-setup').textContent = currentPunchline;
      document.getElementById('reveal-btn').style.display = 'none';
    }

    async function fetchCat() {
      const response = await fetch('https://catfact.ninja/fact');
      const data = await response.json();
      document.getElementById('cat-output').textContent = data.fact;
    }

    async function fetchChuck() {
      const response = await fetch('https://api.chucknorris.io/jokes/random');
      const data = await response.json();
      document.getElementById('chuck-output').textContent = data.value;
    }
  </script>
</body>
</html>
